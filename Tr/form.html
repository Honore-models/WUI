<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h5>Form</h5>
    <form action="#" method="post">
        <label for="name">Enter the first name</label><br>
        <input type="text" name="name" id="name" placeholder="Name"><br>
        <label for="king">Enter the last name</label><br>
        <input type="text" name="king" id="king" placeholder="Name"><br>
        <input type="submit" value="Enter">
        <input type="reset">

    </form><hr>

    <h4>Checkbox</h4>

    <form action="#" method="post">

        <input type="checkbox" name="kk" id="hon">
        <label for="hon">Car</label><br>
        <input type="checkbox" name="kim" id="zip">
        <label for="zip">Plane</label><br>
        <input type="checkbox" name="ll" id="loa">
        <label for="loa">Drone</label><br>
    </form>
    <hr>
    <h3>Radio</h3>
    <form action="#" method="post">
        <input type="radio" id="html" name="css" value="HTML">
        <label for="html">HTML</label><br>
        <input type="radio" id="css" name="css" value="CSS">
        <label for="css">CSS</label><br>
        <input type="radio" id="js" name="css" value="CSS">
        <label for="js">JS</label>

    </form><hr>
    <h3>Option</h3>
    <form action="#" method="post">
        <label for="class">Choose</label>

        <select name="class" id="class">
            <option value="car">Car</option>
            <option value="cii">Benz</option>
            <option value="ert">Audi</option>
            <option value="car">Car</option>
            <option value="cii">Benz</option>
            <option value="ert">Audi</option>
            
        </select>
    </form><hr>
    <form action="#">
        <label for="date">Date:</label>
        <input type="date" name="date" id="date">
    </form>
</body>

</html>
