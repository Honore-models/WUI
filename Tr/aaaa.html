<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title> Student registration</title>
</head>

<body>
    <h1>Student registration</h1>

    <div>
        <form action="#" method="POST">
            <div><label for="fname"> FirstName</label> <input type="text" name="fname" id="fname"
                    placeholder="Enter first name" required></div>
            <div><label for="lname"> LastName</label> <input type="text" name="lastName" id="lname"
                    placeholder="last name"></div>
            <div><label for="email"> FirstName</label> <input type="email" name="email" id="email"></div>
            <div><label for="gender"> gender </label>
                <input type="radio" name="gender" value="Male"><label for="male"> Male </label><br>
                <input type="radio" name="gender" value="Female"><label for="female"> Female </label>br
            </div>

            <div><label for="languages"> Spoken Languages</label>

                <input type="checkbox" name="english" value="English" id="english"><label for="english">English </label>
                <input type="checkbox" name="french" value="French" id="french"><label for="french">French </label>
                <input type="checkbox" name="kinya" value="Kinya" id="kinya"><label for="kinya">Kinya</label>
                <input type="checkbox" name="swahili" value="Swahili" id="swahili"><label for="swahili">Swahili</label>
                <input type="checkbox" name="chinese" value="Chinese" id="chinese"><label for="chinese">Chinese </label>
                <div>

                    <div><label for="age">Age</label><input type="number" name="age" id="age"></div>

                    <div><label for="dob"> Date of birth</label><input type="date" name="dob" id="dob"></div>

                    <div><label for="nationality"> Nationality </label>
                        <select name="nationality" id="nationality">
                            <option value=""> ---Select Nationality---</option>
                            <option value="Rwanda"> Rwanda</option>
                            <option value="Uganda"> Uganda</option>
                            <option value="Kenya"> Kenya</option>
                            <option value="Burundi"> Burundi</option>
                            <option value="USA"> USA</option>
                            <option value=""></option>
                    </div>
                    <textarea name="" id=""cols="30" rows="10" placeholder="Your Message"></textarea>
                    <input type="submit" placeholder="Send Message"required>


</body>
