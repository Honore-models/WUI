<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div p {
            color: red;
        }

        div>p {
            background-color: green;
        }

        h1+p {
            color: red;
        }
    </style>
</head>

<body>
    <h1>Title</h1>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>

    <div>
        <p>Selected as direct child</p>
        <section>
            <p>Also selected</p>
        </section>
    </div>

    <input type="text" place-holder="honore">

</body>

</html>
