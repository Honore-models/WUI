<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h2>My Video</h2>
    <video height="500" width="600" controls>
        <source src="video.mp4" type="video/mp4">

    </video>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/oiKj0Z_Xnjc&list=RDoiKj0Z_Xnjc&start_radio=1"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>

    <svg width="200" height="200">
        <circle cx="100" cy="100" r="80" fill="green" stroke="black" stroke-width="2" />

        <rect x="50" y="50" width="100" height="100" fill="blue" stroke="black" stroke-width="2" />

        <line x1="0" y1="0" x2="200" y2="200" stroke="red" stroke-width="2" />
    </svg>
    <svg width="300" height="200">
        <polygon points="100,20 40,198 190,78 10,78 160,198" fill="yellow" stroke="black" stroke-width="2"/>
    </svg>
    
</body>

</html>
