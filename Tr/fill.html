<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        h1{
            text-align: center;
        }
    </style>
</head>
<body>
     <h1><b>Steudent Data Entry Form</b></h1>
    <form action="#" method="post">
        <label for="name">Student name</label>
        <input type="text" name="name" id="ii" placeholder="name"><br><br>
        <label for="king">Email</label>
        <input type="email" name="king" id="ff" placeholder="Email">
          <br>
          <label for="">Gender:</label>
          <input type="radio" name="place" id="place" value="cat">
          <label for="place">Boy</label>
          <input type="radio" name="place" id="min" value="cat">
          <br>
          <label for="min">Girl</label><br>
          

          <input type="checkbox" name="check" id="check" value="box">
          <label for="check">Tamil</label>
          <input type="checkbox" name="tel" id="tel" value="tel">
          <label for="tel">Telugu</label>
          <input type="checkbox" name="eng" id="eng" value="eng">
          <label for="check">English</label>
          <input type="checkbox" name="check" id="phy" value="phy">
          <label for="phy">Physics</label><br>
          <br>

          <label for="">City/Town</label>
          <select name="town" id="town">
            <option value="town">Kigali</option>
            <option value="kn">Kampala</option>
            <option value="tz">Tanzania</option>
            <option value="to">Burundi</option>
          </select><br>

          <textarea name="nom" id="nom" cols="35" rows="15"></textarea>
          <input type="submit" value="Enter">

         </form>
</body>
</html>
