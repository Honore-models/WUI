UNITS: 

1️⃣ Pixels (px)
A pixel (short for picture element) is the smallest unit of a digital image or screen.

2️⃣ em (relative to parent)
What it means: Relative to the font-size of the parent element.
Behavior: Scales based on parent.

body {
  font-size: 16px;
}
h1 {
  font-size: 2em; ==>  2 × 16px = 32px 
}

3️⃣ rem (relative to root) The root is usually 16px

What it means: Relative to the root <html> font-size (usually 16px unless changed).
Behavior: Always scales relative to root, not parent

html {
  font-size: 16px;
}
p {
  font-size: 1rem; /* 1 × 16px = 16px */
}

4️⃣ % (percentage of parent)

What it means: Relative to parent element’s font-size.
Behavior: Similar to em but expressed as a percentage.

body {
  font-size: 16px;
}
p {
  font-size: 125%; /* 125% of 16px = 20px */
}

100% = same as parent font-size
Less than 100% = smaller
More than 100% = bigger
