<!doctype html>
<html>
  <head>
    <title>Dashboard</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
      }

      .dashboard {
        padding: 20px;
      }

      .cards {
        display: flex;
        gap: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
        width: 200px;
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <h1>Dashboard</h1>

      <div class="cards">
        <div class="card">
          <h2>Users</h2>
          <p>150</p>
        </div>

        <div class="card">
          <h2>Sales</h2>
          <p>$1200</p>
        </div>

        <div class="card">
          <h2>Orders</h2>
          <p>45</p>
        </div>
      </div>
    </div>
  </body>
</html>
