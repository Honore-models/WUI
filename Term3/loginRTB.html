<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="loginRTB.css" />
    <title>RTB - Login</title>
  </head>
  <body>
    <div class="card">
      <!-- LOGO -->
      <div class="logo-area">
        <div class="logo-icon">&#x1F46F;</div>
        <div class="logo-row">
          <div class="logo-rtb">RTB</div>
          <div class="logo-divider"></div>
          <div class="logo-text-block">
            <div class="logo-rwanda">RWANDA</div>
            <div class="logo-tvet">TVET BOARD</div>
          </div>
        </div>
      </div>

      <!-- TITLE -->
      <div class="login-title">LOGIN</div>

      <!-- FORM -->
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="adminrtb@gmail.com" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••••••" />
        <div class="forgot-row">
          <a href="#">Forgot Password?</a>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember" />
        <label for="remember">Remember me</label>
      </div>

      <button class="btn-login">Login</button>

      <div class="register-row">Not registered? <a href="#">Register</a></div>
    </div>
  </body>
</html>
