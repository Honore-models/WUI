<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .main {
        background-color: beige;
        display: flex;
        flex-wrap: wrap;
      }
      div:nth-child(even) {
        background-color: rgb(67, 67, 158);
        color: #fff;
        font-size: 1.5em;
        height: 200px;
        width: 20%;
        text-align: center;
      }
      .main > div:nth-child(odd) {
        background-color: rgb(108, 239, 111);
        color: #eb14ce;
        font-size: 1.5em;
        height: 200px;
        width: 20%;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="container1">Div1</div>
      <div class="container2">Div2</div>
      <div class="container3">Div3</div>
      <div class="container4">Div4</div>
      <div class="container5">Div5</div>
      <div class="container6">Div6</div>
      <div class="container7">Div7</div>
      <div class="container8">Div8</div>
      <div class="container9">Div9</div>
      <div class="container10">Div10</div>
    </div>
  </body>
</html>
