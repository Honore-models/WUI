<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
      }
      .main > div:nth-child(even) {
        width: 25%;
        height: 200px;
        background-color: rgb(2, 124, 2);
        color: white;
        font-size: 2em;
      }
      .main > div:nth-child(odd) {
        width: 25%;
        height: 200px;
        background-color: rgb(215, 218, 6);
        color: white;
        font-size: 2em;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="containers1">Div1</div>
      <div class="containers2">Div2</div>
      <div class="containers3">Div3</div>
      <div class="containers4">Div4</div>
      <div class="containers5">Div5</div>
      <div class="containers6">Div6</div>
      <div class="containers7">Div7</div>
      <div class="containers8">Div8</div>
      <div class="containers9">Div9</div>
      <div class="containers10">Div10</div>
    </div>
  </body>
</html>
