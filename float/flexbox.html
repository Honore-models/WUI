<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
      }
      .main {
        background-color: antiquewhite;
        display: flex;
        flex-wrap: wrap;
        flex-direction: row-reverse;
      }
      .main > div:nth-child(even) {
        width: 25%;
        height: 200px;
        background-color: rgb(2, 124, 2);
        color: #fff;
        font-size: 2em;
      }
      .main > div:nth-child(odd) {
        width: 25%;
        height: 200px;
        background-color: rgb(215, 218, 6);
        color: #fff;
        font-size: 2em;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="container1">Div1</div>
      <div class="container2">Div2</div>
      <div class="container3">Div3</div>
      <div class="container4">Div4</div>
      <div class="container5">Div5</div>
      <div class="container6">Div6</div>
      <div class="container7">Div7</div>
      <div class="container8">Div8</div>
      <div class="container9">Div9</div>
      <div class="container10">Div10</div>
    </div>
  </body>
</html>
