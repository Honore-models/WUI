<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HP Layout Only</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #ebedf0;
        font-family: Arial, sans-serif;
        padding: 28px;
        color: #ffffff;
      }
      .topbar {
        width: 100%;
        height: 92px;
        padding: 0 26px;
        border-radius: 2px;
        background: linear-gradient(
          105deg,
          #2f78be 0%,
          #5fa9e2 50%,
          #3178be 100%
        );
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 30px;
      }
      .left-group,
      .right-group {
        display: flex;
        align-items: center;
        gap: 22px;
      }
      .logo {
        width: 86px;
        height: 86px;
        border-radius: 50%;
        background: #f4f6f8;
        color: #2f78be;
        font-size: 56px;
        font-style: italic;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }
      .search-wrap {
        width: min(700px, 58vw);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .search-input {
        height: 56px;
        flex: 1;
        background: #f6f7f9;
        border-radius: 6px;
      }
      .search-btn {
        width: 68px;
        height: 56px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .search-btn::before {
        content: "";
        width: 18px;
        height: 18px;
        border: 3px solid #e9f4ff;
        border-radius: 50%;
        position: absolute;
        transform: translate(-4px, -4px);
      }
      .search-btn::after {
        content: "";
        width: 11px;
        height: 3px;
        background: #e9f4ff;
        border-radius: 2px;
        position: absolute;
        transform: rotate(45deg) translate(6px, 6px);
        transform-origin: center;
      }
      .icon {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.12);
      }
      .canvas {
        width: 100%;
        min-height: 860px;
        background: linear-gradient(
          110deg,
          #d7dbe2 0%,
          #eceef2 55%,
          #d7dbe2 100%
        );
        display: flex;
        gap: 26px;
        padding: 0 0 22px 0;
      }
      .left-rail {
        width: 135px;
        flex: 0 0 135px;
      }
      .main {
        flex: 1;
        padding-right: 6px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }
      .hero {
        margin-top: 0;
        height: 410px;
        border-radius: 6px;
        background: radial-gradient(
          circle at 65% 58%,
          rgba(255, 255, 255, 0.92) 0%,
          rgba(205, 236, 255, 0.85) 15%,
          rgba(116, 182, 228, 0.65) 35%,
          rgba(45, 126, 200, 0.95) 100%
        );
      }
      .row-three {
        display: flex;
        gap: 30px;
      }
      .card-wide {
        flex: 1;
        height: 250px;
        border-radius: 8px;
        background: #cfd5de;
      }
      .bottom {
        display: flex;
        gap: 32px;
      }
      .bottom-left {
        flex: 1.45;
        height: 390px;
        border-radius: 6px;
        background: radial-gradient(
          circle at 70% 52%,
          rgba(255, 255, 255, 0.85) 0%,
          rgba(200, 231, 249, 0.9) 20%,
          rgba(120, 183, 224, 0.75) 55%,
          rgba(58, 140, 206, 0.93) 100%
        );
      }
      .bottom-right {
        flex: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 28px;
        align-content: space-between;
      }
      .tile {
        width: calc(50% - 14px);
        height: 180px;
        border-radius: 8px;
        background: #cfd5de;
      }
      @media (max-width: 1200px) {
        body {
          padding: 16px;
        }
        .topbar {
          height: auto;
          padding: 14px;
          flex-wrap: wrap;
        }
        .left-group,
        .right-group,
        .search-wrap {
          width: 100%;
        }
        .right-group {
          justify-content: flex-end;
        }
        .canvas {
          padding: 16px;
        }
        .left-rail {
          display: none;
        }
      }
      @media (max-width: 900px) {
        .row-three,
        .bottom {
          flex-direction: column;
        }
        .bottom-right {
          gap: 16px;
        }
        .tile {
          width: calc(50% - 8px);
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="left-group">
        <div class="logo">hp</div>
      </div>
      <div class="search-wrap">
        <div class="search-input"></div>
        <div class="search-btn"></div>
      </div>
      <div class="right-group">
        <div class="icon"></div>
        <div class="icon"></div>
      </div>
    </header>
    <main class="canvas">
      <aside class="left-rail"></aside>
      <section class="main">
        <div class="hero"></div>
        <div class="row-three">
          <div class="card-wide"></div>
          <div class="card-wide"></div>
          <div class="card-wide"></div>
        </div>
        <div class="bottom">
          <div class="bottom-left"></div>
          <div class="bottom-right">
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
